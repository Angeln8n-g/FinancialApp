version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    restart: always
    environment:
      POSTGRES_USER: hogariq_user
      POSTGRES_PASSWORD: hogariq_prod_password_9988
      POSTGRES_DB: hogariq_prod_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hogariq_user -d hogariq_prod_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_prod_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL: postgresql://hogariq_user:hogariq_prod_password_9988@db:5432/hogariq_prod_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: hogariq_prod_secret_key_change_me_in_coolify
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
      PORT: 3000
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  ollama_prod_data:
