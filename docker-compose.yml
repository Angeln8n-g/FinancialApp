version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: hogariq-postgres
    environment:
      POSTGRES_USER: hogariq_user
      POSTGRES_PASSWORD: hogariq_dev_password
      POSTGRES_DB: hogariq_dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hogariq-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: hogariq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hogariq-network
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: hogariq-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hogariq-network
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hogariq-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hogariq.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    networks:
      - hogariq-network
    depends_on:
      - postgres
    restart: always

networks:
  hogariq-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
